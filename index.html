<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="我的記帳">
    
    <title>個人財務助理 V2</title>
    <style>
        /* 針對 iPhone 優化的配色與樣式 */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 20px;
            margin: 0;
            /* 防止手機上長按選取文字 */
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            max-width: 450px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 700; letter-spacing: 1px; }

        .tab-group { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 25px; 
            background: #0f172a; 
            padding: 5px; 
            border-radius: 12px;
        }
        .tab-btn { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            background: transparent; 
            color: var(--text-dim); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.95em;
            transition: all 0.2s; 
        }
        .tab-btn.active { 
            background: var(--primary); 
            color: #0f172a; 
            font-weight: bold; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        label { display: block; margin-top: 18px; font-size: 0.85em; color: var(--text-dim); font-weight: 500; }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-top: 6px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; /* 16px 以上 iPhone 才不會自動放大 */
            -webkit-appearance: none; /* 去除 iOS 內建陰影 */
        }

        textarea { resize: none; height: 80px; }

        button#submit { 
            width: 100%; 
            padding: 16px; 
            margin-top: 30px; 
            background: var(--secondary); 
            border: none; 
            border-radius: 14px; 
            color: white; 
            font-size: 1.1em; 
            font-weight: 700; 
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        button#submit:active { transform: scale(0.98); opacity: 0.9; }

        #msg { text-align: center; margin-top: 15px; font-size: 0.9em; min-height: 1.5em; }

        /* 針對數字輸入優化 */
        input[type="number"] { font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 財務助理</h2>
    <div class="tab-group">
        <button class="tab-btn active" onclick="switchTab('lending', this)">借貸往來</button>
        <button class="tab-btn" onclick="switchTab('stock', this)">存股紀錄</button>
    </div>

    <form id="mainForm">
        <input type="hidden" id="entryType" value="lending">
        
        <label>日期</label>
        <input type="date" id="date" required>

        <div id="lendingSection">
            <label>對象</label>
            <select id="person">
                <option value="小秋">小秋</option>
                <option value="姊姊">姊姊</option>
                <option value="小羅">小羅</option>
                <option value="老羅">老羅</option>
                <option value="公司股">公司股</option>
            </select>

            <label>類型</label>
            <select id="action">
                <option value="借出">借出 (+)</option>
                <option value="還錢">還錢 (-)</option>
            </select>

            <label>項目</label>
            <select id="item">
                <option value="Netflix">Netflix</option>
                <option value="淘寶">淘寶</option>
                <option value="代墊">代墊</option>
                <option value="健保">健保</option>
                <option value="還錢">還錢</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <div id="stockSection" style="display:none;">
            <label>股票代號</label>
            <select id="symbol">
                <option value="0050">0050 (元大台灣50)</option>
                <option value="00713">00713 (元大高息低波)</option>
                <option value="00757">00757 (統一FANG+)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label>股數</label>
                    <input type="number" id="shares" inputmode="numeric" placeholder="0" oninput="calcStockTotal()">
                </div>
                <div style="flex:1;">
                    <label>單價</label>
                    <input type="number" id="price" inputmode="decimal" step="0.01" placeholder="0.0" oninput="calcStockTotal()">
                </div>
            </div>
        </div>

        <label>總金額</label>
        <input type="number" id="amount" inputmode="numeric" required placeholder="NT$">

        <label>備註</label>
        <textarea id="note" placeholder="輸入備註內容..."></textarea>

        <button type="button" id="submit" onclick="sendData()">確認送出紀錄</button>
        <p id="msg"></p>
    </form>
</div>

<script>
    // AKfycbwDCsLNoF85lt7QOlcwV3t4pnfzhPLWhq_WWNT5ogNucjYWKfhLH-CS-iPSnS0qXCPq9Q
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwDCsLNoF85lt7QOlcwV3t4pnfzhPLWhq_WWNT5ogNucjYWKfhLH-CS-iPSnS0qXCPq9Q/exec";

    function switchTab(type, btn) {
        document.getElementById('entryType').value = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('lendingSection').style.display = type === 'lending' ? 'block' : 'none';
        document.getElementById('stockSection').style.display = type === 'stock' ? 'block' : 'none';
        document.getElementById('msg').innerText = "";
    }

    function calcStockTotal() {
        const s = document.getElementById('shares').value;
        const p = document.getElementById('price').value;
        if(s && p) {
            document.getElementById('amount').value = Math.round(s * p);
        }
    }

    async function sendData() {
        const btn = document.getElementById('submit');
        const msg = document.getElementById('msg');
        const type = document.getElementById('entryType').value;

        btn.disabled = true;
        msg.innerText = "⏳ 傳送中...";
        msg.style.color = "#94a3b8";

        const payload = {
            type: type,
            date: document.getElementById('date').value.replace(/-/g, '/'),
            amount: document.getElementById('amount').value,
            note: document.getElementById('note').value
        };

        if (type === 'lending') {
            payload.person = document.getElementById('person').value;
            payload.action = document.getElementById('action').value;
            payload.item = document.getElementById('item').value;
        } else {
            payload.symbol = document.getElementById('symbol').value;
            payload.shares = document.getElementById('shares').value;
            payload.price = document.getElementById('price').value;
            payload.total = payload.amount;
        }

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            msg.innerText = "✅ 紀錄成功！";
            msg.style.color = "#10b981";
            document.getElementById('mainForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            
            // 兩秒後清除成功訊息
            setTimeout(() => { msg.innerText = ""; }, 2000);
        } catch (e) {
            msg.innerText = "❌ 發生錯誤";
            msg.style.color = "#ef4444";
        } finally {
            btn.disabled = false;
        }
    }

    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
